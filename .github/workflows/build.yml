name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Windows binary
        run: GOOS=windows GOARCH=amd64 go build -o mcp-icloud-calendar.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-icloud-calendar-windows
          path: mcp-icloud-calendar.exe
